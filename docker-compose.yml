version: '3.8'

services:
  proxy:
    image: ${PROXY_IMAGE:-nginx:1.27-alpine}
    container_name: ${PROXY_CONTAINER_NAME:-odoo-proxy}
    depends_on:
      odoo:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-8070}:80"
    volumes:
      - ./config/nginx:/etc/nginx/conf.d${BIND_MOUNT_SUFFIX:-}
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://127.0.0.1/ || exit 1
      interval: ${PROXY_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${PROXY_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${PROXY_HEALTHCHECK_RETRIES:-5}
      start_period: ${PROXY_HEALTHCHECK_START_PERIOD:-10s}
    restart: ${RESTART_POLICY:-always}
    security_opt:
      - no-new-privileges:true
    mem_limit: ${PROXY_MEM_LIMIT:-256m}
    pids_limit: ${PROXY_PIDS_LIMIT:-100}
    networks:
      - edge
      - app

  odoo:
    image: ${ODOO_IMAGE:-odoo:18}
    container_name: ${ODOO_CONTAINER_NAME:-odoo18}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Datos persistentes de Odoo
      - odoo-data:/var/lib/odoo
      
      # Configuración
      - ./config:/etc/odoo${BIND_MOUNT_SUFFIX:-}

      # Addons personalizados
      - ./addons:/mnt/extra-addons${BIND_MOUNT_SUFFIX:-}
    environment:
      - HOST=${DB_HOST:-db}
      - PORT=${DB_PORT:-5432}
      - USER=${DB_USER:-odoo}
      - PASSWORD=${DB_PASSWORD:-odoo}
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8069/web/login', timeout=5)"
      interval: ${ODOO_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${ODOO_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${ODOO_HEALTHCHECK_RETRIES:-5}
      start_period: ${ODOO_HEALTHCHECK_START_PERIOD:-60s}
    restart: ${RESTART_POLICY:-always}
    security_opt:
      - no-new-privileges:true
    mem_limit: ${ODOO_MEM_LIMIT:-2g}
    cpus: ${ODOO_CPUS:-2.0}
    pids_limit: ${ODOO_PIDS_LIMIT:-512}
    networks:
      - app

  db:
    image: ${DB_IMAGE:-postgres:15}
    container_name: ${DB_CONTAINER_NAME:-odoo-db}
    environment:
      - POSTGRES_DB=${DB_NAME:-postgres}
      - POSTGRES_USER=${DB_USER:-odoo}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-odoo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: ${DB_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${DB_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${DB_HEALTHCHECK_RETRIES:-5}
      start_period: ${DB_HEALTHCHECK_START_PERIOD:-10s}
    restart: ${RESTART_POLICY:-always}
    security_opt:
      - no-new-privileges:true
    mem_limit: ${DB_MEM_LIMIT:-1g}
    cpus: ${DB_CPUS:-1.0}
    pids_limit: ${DB_PIDS_LIMIT:-256}
    networks:
      - app

volumes:
  odoo-data:
  postgres-data:

networks:
  edge:
  app:
    internal: true
