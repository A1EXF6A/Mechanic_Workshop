version: '3.8'

services:
  odoo:
    image: odoo:18
    container_name: odoo18
    depends_on:
      - db
    ports:
      - "8070:8069"
    volumes:
      # Datos persistentes de Odoo
      - odoo-data:/var/lib/odoo
      
      # Configuración
      - ./config:/etc/odoo
      
      # Addons personalizados
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    restart: always

  db:
    image: postgres:15
    container_name: odoo-db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

volumes:
  odoo-data:
  postgres-data: